<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Visual PSO2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1115;
            --panel-bg: #161b22;
            --panel-border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-primary: #238636;
            --accent-hover: #2ea043;
            --accent-blue: #58a6ff;
            --item-hover: #1f2428;
            --item-selected: #252b32;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--panel-border);
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #fff;
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        .item-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .list-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .list-item:hover {
            background-color: var(--item-hover);
        }

        .list-item.active {
            background-color: var(--item-selected);
            border-left-color: var(--accent-blue);
        }

        .list-item .item-id {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 4px;
        }

        .list-item .item-text {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid var(--panel-border);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(240, 246, 252, 0.1);
        }

        .btn-primary {
            background-color: var(--accent-primary);
            color: #ffffff;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .main-editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            background-image: radial-gradient(circle at top right, rgba(88, 166, 255, 0.05), transparent 50%);
        }

        .editor-container {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .editor-container.active {
            opacity: 1;
            pointer-events: auto;
        }

        .editor-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
        }

        .editor-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .input-group label span {
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 8px;
        }

        textarea {
            width: 100%;
            background-color: var(--bg-color);
            border: 1px solid var(--panel-border);
            color: var(--text-primary);
            padding: 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.5;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        textarea[readonly] {
            background-color: rgba(22, 27, 34, 0.5);
            border-color: transparent;
            color: var(--text-secondary);
            cursor: default;
        }

        textarea[readonly]:focus {
            box-shadow: none;
            border-color: transparent;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        .status-icon {
            font-size: 20px;
        }
        
        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn.loading .loader {
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Líneas Traducibles</h2>
            <p id="filename-display">Cargando...</p>
        </div>
        <div class="item-list" id="item-list">
            <!-- Items added by JS -->
        </div>
        <div class="sidebar-footer">
            <button class="btn btn-primary" id="btn-github" disabled>
                <div class="loader"></div>
                Subir a GitHub (Crear PR)
            </button>
        </div>
    </div>

    <div class="main-editor">
        <div class="editor-container" id="editor-container">
            <div class="editor-header">
                <h1 id="editor-title">Selecciona una línea</h1>
                <p id="editor-subtitle">Haz clic en un elemento de la barra lateral para comenzar a editar.</p>
            </div>

            <div class="input-group">
                <label>Texto Original Japonés <span>(Solo lectura)</span></label>
                <textarea id="txt-original" readonly></textarea>
            </div>

            <div class="input-group">
                <label>Traducción <span>(Usa &lt;br&gt; en lugar de Enter para saltos)</span></label>
                <textarea id="txt-traduccion" placeholder="Escribe la traducción aquí..."></textarea>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button class="btn btn-primary" id="btn-save" style="width: auto;">
                    <div class="loader"></div>
                    Guardar Cambios Localmente
                </button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">
        <span class="status-icon" id="notif-icon">✅</span>
        <span id="notif-text">Guardado correctamente</span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');
        
        let allItems = [];
        let currentItem = null;

        const itemListEl = document.getElementById('item-list');
        const filenameDisplayEl = document.getElementById('filename-display');
        const editorContainerEl = document.getElementById('editor-container');
        const editorTitleEl = document.getElementById('editor-title');
        const txtOriginalEl = document.getElementById('txt-original');
        const txtTraduccionEl = document.getElementById('txt-traduccion');
        const btnSaveEl = document.getElementById('btn-save');
        const btnGithubEl = document.getElementById('btn-github');
        
        if (!fileName) {
            filenameDisplayEl.textContent = "Error: No se especificó archivo.";
        } else {
            filenameDisplayEl.textContent = fileName;
            loadFileData();
        }

        async function loadFileData() {
            try {
                const response = await fetch(`/api/file?name=${encodeURIComponent(fileName)}`);
                if (!response.ok) throw new Error("Error al cargar datos");
                
                const data = await response.json();
                allItems = data.items; // Expecting [{id: '...', section: '...', group: '1', text: '...', original: '...'}, ...]
                
                renderList();
                if (allItems.length > 0) {
                    btnGithubEl.disabled = false;
                }
            } catch (e) {
                showNotification("❌", "Error al cargar el archivo desde el bot.");
            }
        }

        function renderList() {
            itemListEl.innerHTML = '';
            allItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.id = `item-${index}`;
                
                const idDiv = document.createElement('div');
                idDiv.className = 'item-id';
                idDiv.textContent = item.id;
                
                const txtDiv = document.createElement('div');
                txtDiv.className = 'item-text';
                txtDiv.textContent = item.text || '(Sin traducción)';
                
                div.appendChild(idDiv);
                div.appendChild(txtDiv);
                
                div.addEventListener('click', () => selectItem(index));
                itemListEl.appendChild(div);
            });
        }

        function selectItem(index) {
            // Remove active class from previous
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            // Add active class to current
            document.getElementById(`item-${index}`).classList.add('active');
            
            currentItem = allItems[index];
            
            editorTitleEl.textContent = currentItem.id;
            txtOriginalEl.value = currentItem.original || "(Sin original)";
            txtTraduccionEl.value = currentItem.text || "";
            
            editorContainerEl.classList.add('active');
            txtTraduccionEl.focus();
        }

        // PREVENT PHYSICAL NEWLINES (ENTER KEY)
        txtTraduccionEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Stop the physical newline
                
                // Insert <br> at cursor position
                const start = this.selectionStart;
                const end = this.selectionEnd;
                const val = this.value;
                this.value = val.substring(0, start) + "<br>" + val.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        // SAVE BUTTON
        btnSaveEl.addEventListener('click', async () => {
            if (!currentItem) return;
            
            // Re-sanitize just in case someone pasted physical newlines
            let finalVal = txtTraduccionEl.value.trim();
            finalVal = finalVal.replace(/\r\n|\n|\r/g, "<br>");
            txtTraduccionEl.value = finalVal;
            
            btnSaveEl.classList.add('loading');
            
            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        file: fileName,
                        section: currentItem.section,
                        id: currentItem.id,
                        text: finalVal
                    })
                });
                
                if (!response.ok) throw new Error();
                
                // Update local state and UI list
                currentItem.text = finalVal;
                const activeListItemTxt = document.querySelector('.list-item.active .item-text');
                if (activeListItemTxt) {
                    activeListItemTxt.textContent = finalVal;
                }
                
                showNotification("✅", "Línea guardada localmente");
            } catch (e) {
                showNotification("❌", "Error al guardar localmente");
            } finally {
                btnSaveEl.classList.remove('loading');
            }
        });

        // GITHUB BUTTON
        btnGithubEl.addEventListener('click', async () => {
            if (!fileName) return;
            btnGithubEl.classList.add('loading');
            
            try {
                const response = await fetch('/api/github', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file: fileName })
                });
                
                const data = await response.json();
                
                if (response.ok && data.url) {
                    showNotification("✅", "PR Creado exitosamente");
                    // Show a message in editor
                    editorContainerEl.innerHTML = `
                        <div style="text-align:center; padding: 40px;">
                            <h2 style="color: #2ea043; margin-bottom: 20px;">¡Completado!</h2>
                            <p style="color: #c9d1d9; margin-bottom: 20px;">Tu Pull Request con las traducciones ha sido creado en GitHub.</p>
                            <a href="${data.url}" target="_blank" class="btn btn-primary" style="display: inline-flex; width: auto;">Ver Pull Request</a>
                        </div>
                    `;
                } else {
                    throw new Error(data.error || "Error desconocido");
                }
            } catch (e) {
                showNotification("❌", "Error: " + e.message);
            } finally {
                btnGithubEl.classList.remove('loading');
            }
        });

        let notifTimeout;
        function showNotification(icon, text) {
            const notif = document.getElementById('notification');
            document.getElementById('notif-icon').textContent = icon;
            document.getElementById('notif-text').textContent = text;
            
            notif.classList.add('show');
            
            clearTimeout(notifTimeout);
            notifTimeout = setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
