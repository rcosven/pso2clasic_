[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# IMPORTANTE: solo redeploy cuando cambia el bot, NO en cada commit de CSV.
watchPatterns = [
  "Dockerfile",
  "requirements.txt",
  "translate_missing.py",
  "railway.toml",
  "start.sh",
  ".dockerignore",
]

[deploy]
startCommand = "python translate_missing.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 100
