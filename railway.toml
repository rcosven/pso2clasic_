[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Solo rebuild cuando cambia el bot (no en cada commit de CSV del traductor).
watchPatterns = ["Dockerfile", "requirements.txt", "translate_missing.py", "railway.toml", "start.sh"]

[deploy]
startCommand = "python translate_missing.py"
# Reiniciar el contenedor si el proceso muere (incluye autorestart del bot).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 100
