[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Solo redeploy cuando cambia el bot (NO en cada commit de CSV).
watchPatterns = [
  "Dockerfile",
  "requirements.txt",
  "translate_missing.py",
  "railway.toml",
  "start.sh",
  ".dockerignore",
]

[deploy]
# Comando modificado para mantener el contenedor en reposo absoluto
startCommand = "python translate_missing.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
